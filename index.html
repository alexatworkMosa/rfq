<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחולל הצעות מחיר — שטיין יפים שיפוצים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');

  :root {
    --blue:    #1e508a;
    --blue-lt: #e8f0fb;
    --line:    #c0c9d6;
    --bg:      #f3f6f9;
    --white:   #ffffff;
    --text:    #111827;
    --muted:   #4b5563;
    --red:     #dc3545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  }
  .topbar-logo { display: flex; align-items: center; gap: 12px; }
  .topbar-logo .icon {
    width: 42px; height: 42px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
  }
  .topbar-logo .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-top: 2px; }

  .topbar-actions { display: flex; gap: 10px; }

  .btn {
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-outline { background: transparent; border-color: var(--line); color: var(--muted); }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
  .btn-gold { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-gold:hover { background: #163b65; border-color: #163b65; }

  /* ── CLIENT STRIP ── */
  .client-strip {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
  }
  .client-strip .field { display: flex; align-items: center; gap: 12px; }
  .client-strip label { font-size: 15px; font-weight: 700; color: var(--muted); }
  .client-strip input {
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 8px 14px;
    font-size: 16px;
    font-weight: 500;
    width: 260px;
    background: #fff;
  }

  /* ── MAIN CONTENT ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 30px 20px 80px; }

  .panel {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 25px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  }
  .panel-head {
    background: #f8fafc;
    border-bottom: 1px solid var(--line);
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-head .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); }

  /* ── TABLE ── */
  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th {
    font-size: 14px; font-weight: 700; color: var(--muted);
    text-align: right; padding: 14px 12px;
    border-bottom: 2px solid var(--line);
    background: #f1f5f9;
  }
  .items-table td { padding: 12px; border-bottom: 1px solid var(--line); vertical-align: top; }

  textarea, input[type="text"], input[type="number"] { 
    border: 1px solid var(--line); 
    border-radius: 6px;
    padding: 8px 12px;
    background: #fff;
    transition: 0.2s; 
    font-family: inherit; 
    color: var(--text);
  }
  textarea:focus, input:focus { 
    border-color: var(--blue); 
    outline: none; 
    box-shadow: 0 0 0 3px rgba(30, 80, 138, 0.15);
  }

  .parent-row textarea { width: 100%; font-size: 16px; font-weight: 600; resize: vertical; min-height: 45px; }
  .sub-row { background: #fafbfc; }
  .sub-row input[type="text"] { font-size: 15px; width: 100%; }
  
  input[type="number"] { font-size: 16px; font-weight: 600; }

  .delete-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 20px; transition: 0.2s; padding: 0 5px; }
  .delete-btn:hover { color: var(--red); }

  .action-link { background: none; border: none; color: var(--blue); font-size: 14px; font-weight: 700; cursor: pointer; padding: 0; margin-left: 15px; }
  .action-link:hover { text-decoration: underline; }
  .action-link.red { color: var(--red); }

  /* ── SUMMARY ── */
  .summary-section { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 25px; align-items: flex-start; }
  .summary-box { background: var(--white); border: 1px solid var(--line); border-radius: 10px; width: 350px; padding: 25px; flex-shrink: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 16px; font-weight: 500; }
  .summary-row.total { border-top: 3px solid var(--blue); border-bottom: none; color: var(--blue); font-weight: 800; font-size: 22px; margin-top: 15px; padding-top: 20px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="icon">🔨</div>
    <div class="brand">שטיין יפים שיפוצים</div>
  </div>
  <div class="topbar-actions">
    <input type="file" id="file-upload" style="display:none" accept=".json" onchange="loadProject(event)">
    
    <button type="button" class="btn btn-outline" onclick="resetForm()">הצעה חדשה</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('file-upload').click()">📂 טען קובץ</button>
    <button type="button" class="btn btn-outline" onclick="saveProject()">💾 שמור טיוטה</button>
    <button type="button" class="btn btn-gold" onclick="printQuote()">🖨 הדפס / שמור כ-PDF</button>
  </div>
</div>

<div class="client-strip">
  <div class="field">
    <label>נושא ההצעה:</label>
    <input type="text" id="quote-title" placeholder="">
  </div>
  <div class="field">
    <label>שם הלקוח:</label>
    <input type="text" id="client-name" placeholder="">
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-head"><div class="dot"></div> פירוט העבודות</div>
    <div class="panel-body" style="padding:0; overflow-x: auto;">
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:50px; text-align:center;">#</th>
            <th style="min-width: 300px;">תיאור עבודה</th>
            <th style="width:140px; text-align:center;">מחיר יחידה</th>
            <th style="width:140px; text-align:left;">סה"כ (₪)</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
      <div style="padding: 20px; display: flex; gap: 15px;">
        <button type="button" class="btn btn-outline" style="flex: 1; border-style: dashed; padding: 14px;" onclick="addRow()">+ הוסף סעיף עבודה חדש</button>
        
        <div style="flex: 1; position: relative;">
          <select id="template-select" style="width: 100%; height: 100%; border: 1px dashed var(--blue); color: var(--blue); background: var(--blue-lt); padding: 0 20px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; outline: none; appearance: none;" onchange="if(this.value) { addTemplate(this.value); this.value=''; }">
            <option value="" disabled selected>+ הוסף מתבנית נפוצה...</option>
            <option value="bathroom">שיפוץ אמבטיה קומפלט</option>
            </select>
          <div style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--blue); font-size: 12px;">▼</div>
        </div>
      </div>
    </div>
  </div>

  <div class="summary-section">
    <div class="panel" style="flex: 1; min-width: 300px;">
      <div class="panel-head"><div class="dot"></div> הערות</div>
      <div class="panel-body" style="padding: 20px;">
        <textarea id="notes" style="width:100%; min-height:80px; font-size: 16px;" placeholder=""></textarea>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-row">
        <span>לפני מע"מ:</span>
        <span id="sum-before" style="font-weight: 700;">₪0</span>
      </div>
      <div style="padding: 15px 0;">
        <label style="display:flex; align-items:center; gap:8px; font-size: 15px; cursor:pointer; font-weight: 600;">
          <input type="checkbox" id="vat-check" checked onchange="calcTotals()" style="width:18px; height:18px; cursor:pointer;">
          כולל מע"מ (18%)
        </label>
      </div>
      <div class="summary-row" id="vat-row">
        <span>מע"מ:</span>
        <span id="sum-vat" style="font-weight: 700;">₪0</span>
      </div>
      <div class="summary-row total">
        <span>סה"כ לתשלום:</span>
        <span id="sum-total">₪0</span>
      </div>
    </div>
  </div>
</div>

<script>
let items = [];

// ----------------------------------------
// כאן מוגדרות התבניות למילוי מהיר!
// תוכל להוסיף עוד בלוקים כאלו בקלות בעתיד.
// ----------------------------------------
const templates = {
  bathroom: {
    desc: "שיפוץ אמבטיה",
    subs: [
      "פרוק קרמיקה ישנה",
      "פרוק כלים סאניטרים ישנים",
      "החלפת צנרת מיים חמים וקרים בתוך האמבטיה",
      "החלפת צנרת ביוב בתוך אמבטיה",
      "הרכבת כלים סאניטריים חדשים, כולל הרכבת שירותים תלויים עם ניאגרה סמויה",
      "הרכבת קרמיקה חדשה"
    ]
  }
};

function addTemplate(key) {
  const tmpl = templates[key];
  if (!tmpl) return;
  
  // הופכים כל שורה מהתבנית לאובייקט מתאים
  const newSubs = tmpl.subs.map(subText => {
    return { desc: subText, price: 0 };
  });

  items.push({ 
    desc: tmpl.desc, 
    price: 0, 
    subs: newSubs, 
    isUnified: false // אם תרצה שהתבנית תמיד תוכנס כ"מחיר אחיד", שנה את זה ל-true
  });
  
  renderItems();
}
// ----------------------------------------

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
}

function addRow() {
  items.push({ desc: '', price: 0, subs: [], isUnified: false });
  renderItems();
}

function addSubRow(i) {
  items[i].subs.push({ desc: '', price: 0 });
  renderItems();
}

function toggleUnified(i) {
  items[i].isUnified = !items[i].isUnified;
  if (items[i].isUnified) {
    const currentSubSum = items[i].subs.reduce((a, b) => a + b.price, 0);
    if (currentSubSum > 0) items[i].price = currentSubSum;
    items[i].subs.forEach(s => s.price = 0);
  }
  renderItems();
}

function renderItems() {
  const tbody = document.getElementById('items-body');
  if (!tbody) return;
  tbody.innerHTML = '';
  
  items.forEach((item, i) => {
    const hasSubs = item.subs.length > 0;
    const rowTotal = item.isUnified ? item.price : (hasSubs ? item.subs.reduce((a,b)=>a+b.price, 0) : item.price);
    
    const tr = document.createElement('tr');
    tr.className = 'parent-row';
    tr.innerHTML = `
      <td style="text-align:center; font-weight:800; color:var(--blue); font-size:18px; padding-top:18px;">${i+1}</td>
      <td>
        <textarea 
          onblur="if(!this.value.trim()) this.style.borderColor='var(--red)';" 
          oninput="items[${i}].desc=this.value; this.style.borderColor='var(--line)';" 
          placeholder="">${escapeHtml(item.desc)}</textarea>
        <div style="margin: 8px 0 12px 0;">
          <button type="button" class="action-link" onclick="addSubRow(${i})">+ הוסף שורה</button>
          ${hasSubs ? `<button type="button" class="action-link ${item.isUnified ? 'red' : ''}" onclick="toggleUnified(${i})">
            ${item.isUnified ? '✕ בטל מחיר אחיד' : '⚙ מחיר אחיד'}
          </button>` : ''}
        </div>
      </td>
      <td style="text-align:center;">
        ${(!hasSubs || item.isUnified) ? 
          `<input type="number" style="width:110px; text-align:left;" value="${item.price}" oninput="items[${i}].price=parseFloat(this.value)||0; calcTotals(); updateRowDisplay(${i})">` : 
          `<span style="font-size:13px; color:var(--muted); font-style:italic; font-weight:600;">מחושב לפי הפירוט</span>`}
      </td>
      <td style="font-weight:800; padding-top:18px; font-size:18px; color:var(--text);" id="total-row-${i}">₪${rowTotal.toLocaleString()}</td>
      <td style="text-align:center; padding-top:16px;"><button type="button" class="delete-btn" onclick="items.splice(${i},1); renderItems();">✕</button></td>
    `;
    tbody.appendChild(tr);

    item.subs.forEach((sub, j) => {
      const subTr = document.createElement('tr');
      subTr.className = 'sub-row';
      subTr.innerHTML = `
        <td></td>
        <td style="padding-right:35px;">
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:13px; font-weight:700; color:var(--muted); flex-shrink: 0;">${i+1}.${j+1}</span>
            <input type="text" 
              onblur="if(!this.value.trim()) this.style.borderColor='var(--red)';" 
              oninput="items[${i}].subs[${j}].desc=this.value; this.style.borderColor='var(--line)';" 
              value="${escapeHtml(sub.desc)}" 
              placeholder="">
          </div>
        </td>
        <td style="text-align:center;">
          ${!item.isUnified ? `<input type="number" style="width:90px; text-align:left;" value="${sub.price}" oninput="items[${i}].subs[${j}].price=parseFloat(this.value)||0; calcTotals(); updateRowDisplay(${i})">` : ''}
        </td>
        <td style="font-size:15px; font-weight:600; color:var(--muted); padding-top:16px;">₪${sub.price.toLocaleString()}</td>
        <td style="text-align:center; padding-top:12px;"><button type="button" class="delete-btn" style="font-size:16px;" onclick="items[${i}].subs.splice(${j},1); renderItems();">✕</button></td>
      `;
      tbody.appendChild(subTr);
    });
  });
  calcTotals();
}

function updateRowDisplay(i) {
  const item = items[i];
  const rowTotal = item.isUnified ? item.price : (item.subs.length > 0 ? item.subs.reduce((a,b)=>a+b.price, 0) : item.price);
  document.getElementById(`total-row-${i}`).textContent = '₪' + rowTotal.toLocaleString();
}

function calcTotals() {
  const subtotal = items.reduce((acc, it) => {
    return acc + (it.isUnified ? it.price : (it.subs.length > 0 ? it.subs.reduce((a,b)=>a+b.price, 0) : it.price));
  }, 0);
  
  const vatCheck = document.getElementById('vat-check');
  const vatRate = vatCheck && vatCheck.checked ? 0.18 : 0;
  const vat = subtotal * vatRate;
  
  document.getElementById('sum-before').textContent = '₪' + subtotal.toLocaleString();
  document.getElementById('sum-vat').textContent = '₪' + vat.toLocaleString();
  document.getElementById('sum-total').textContent = '₪' + (subtotal + vat).toLocaleString();
  document.getElementById('vat-row').style.display = vatRate > 0 ? 'flex' : 'none';
}

function saveProject() {
  const data = {
    title: document.getElementById('quote-title').value,
    client: document.getElementById('client-name').value,
    notes: document.getElementById('notes').value,
    vat: document.getElementById('vat-check').checked,
    items: items
  };
  
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  
  const fileName = (data.client ? "טיוטה_" + data.client.replace(/\s+/g, '_') : "טיוטת_הצעה") + ".json";
  downloadAnchorNode.setAttribute("download", fileName);
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

function loadProject(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      document.getElementById('quote-title').value = data.title || '';
      document.getElementById('client-name').value = data.client || '';
      document.getElementById('notes').value = data.notes || '';
      document.getElementById('vat-check').checked = data.vat !== false;
      
      items = data.items || [];
      renderItems();
      calcTotals();
    } catch (err) {
      alert("שגיאה בטעינת הקובץ. ודא שזהו קובץ JSON תקין שנוצר על ידי המערכת.");
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function printQuote() {
  if (items.length === 0) {
    alert("לא ניתן להדפיס הצעה ריקה. הוסף לפחות סעיף עבודה אחד.");
    return;
  }

  let isMissingDescriptions = false;
  items.forEach(item => {
    if (!item.desc.trim()) isMissingDescriptions = true;
    item.subs.forEach(sub => {
      if (!sub.desc.trim()) isMissingDescriptions = true;
    });
  });

  if (isMissingDescriptions) {
    alert("חובה למלא את כל תיאורי העבודה (ראשיים ותתי-סעיפים) לפני ההדפסה. אנא בדוק שורות שסומנו באדום.");
    renderItems(); 
    return;
  }

  const bizName = "שטיין יפים שיפוצים";
  const client = document.getElementById('client-name').value || "לקוח";
  const title = document.getElementById('quote-title').value || "הצעת מחיר";
  const notes = document.getElementById('notes').value;
  const isVat = document.getElementById('vat-check').checked;
  const dateStr = new Date().toLocaleDateString('he-IL');
  
  const subtotal = items.reduce((acc, it) => acc + (it.isUnified ? it.price : (it.subs.length > 0 ? it.subs.reduce((a,b)=>a+b.price, 0) : it.price)), 0);
  const vat = isVat ? subtotal * 0.18 : 0;
  const total = subtotal + vat;

  let tableRows = '';
  items.forEach((it, i) => {
    const numSubs = it.subs.length;
    const itTotal = it.isUnified ? it.price : (numSubs > 0 ? it.subs.reduce((a,b)=>a+b.price, 0) : it.price);
    const safeDesc = escapeHtml(it.desc).replace(/\n/g, '<br>');
    
    const rowspanIndexAttr = numSubs > 0 ? ` rowspan="${numSubs + 1}"` : '';
    const rowspanPriceAttr = (numSubs > 0 && it.isUnified) ? ` rowspan="${numSubs + 1}"` : '';
    
    tableRows += `
      <tr class="main-row">
        <td class="center"${rowspanIndexAttr} style="${numSubs > 0 ? 'vertical-align: middle;' : ''}">${i+1}</td>
        <td class="desc-cell"><strong>${safeDesc}</strong></td>
        <td class="price-cell"${rowspanPriceAttr} style="${(numSubs > 0 && it.isUnified) ? 'vertical-align: middle;' : ''}">₪${itTotal.toLocaleString()}</td>
      </tr>
    `;
    
    if(numSubs > 0) {
      it.subs.forEach((s, j) => {
        tableRows += `
          <tr class="sub-row-print">
            <td class="desc-cell"><span class="sub-num">${i+1}.${j+1}</span> ${escapeHtml(s.desc)}</td>
            ${it.isUnified ? '' : `<td class="price-cell">₪${s.price.toLocaleString()}</td>`}
          </tr>
        `;
      });
    }
  });

  const printHtml = `
    <!DOCTYPE html>
    <html lang="he" dir="rtl">
    <head>
      <meta charset="UTF-8">
      <title>${escapeHtml(title)} - ${escapeHtml(client)}</title>
      <style>
        body { font-family: Arial, Helvetica, sans-serif; color: #000000; margin: 0; padding: 40px; font-size: 16px; line-height: 1.6; }
        .header { display: flex; justify-content: space-between; border-bottom: 3px solid #000000; padding-bottom: 15px; margin-
