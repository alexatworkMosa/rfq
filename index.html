<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחולל הצעות מחיר — שטיין יפים שיפוצים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');

  :root {
    --blue:    #1e508a;
    --blue-lt: #e8f0fb;
    --line:    #c0c9d6;
    --bg:      #f3f6f9;
    --white:   #ffffff;
    --text:    #111827;
    --muted:   #4b5563;
    --red:     #dc3545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  }
  .topbar-logo { display: flex; align-items: center; gap: 12px; }
  .topbar-logo .icon {
    width: 42px; height: 42px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
  }
  .topbar-logo .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-top: 2px; }

  .topbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-outline { background: transparent; border-color: var(--line); color: var(--muted); }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
  .btn-gold { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-gold:hover { background: #163b65; border-color: #163b65; }

  /* ── CLIENT STRIP ── */
  .client-strip {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
  }
  .client-strip .field { display: flex; align-items: center; gap: 12px; }
  .client-strip label { font-size: 15px; font-weight: 700; color: var(--muted); }
  .client-strip input {
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 8px 14px;
    font-size: 16px;
    font-weight: 500;
    width: 260px;
    background: #fff;
  }

  /* ── LAYOUT (SIDEBAR + MAIN) ── */
  .app-layout { 
    display: flex; 
    max-width: 1300px; 
    margin: 0 auto; 
    padding: 30px 20px 80px; 
    gap: 25px; 
    align-items: flex-start;
  }
  
  .sidebar {
    width: 280px;
    flex-shrink: 0;
  }

  .main-content {
    flex: 1;
    min-width: 0;
  }

  @media (max-width: 950px) {
    .app-layout { flex-direction: column; }
    .sidebar { width: 100%; }
  }

  /* ── PANELS ── */
  .panel {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 25px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  }
  .panel-head {
    background: #f8fafc;
    border-bottom: 1px solid var(--line);
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-head .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); }

  /* ── TEMPLATES BUTTONS ── */
  .template-btn {
    width: 100%;
    text-align: right;
    background: var(--white);
    border: 1px solid var(--line);
    padding: 12px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    margin-bottom: 10px;
    font-family: inherit;
    display: flex;
    align-items: center;
  }
  .template-btn:hover {
    border-color: var(--blue);
    background: var(--blue-lt);
    box-shadow: 0 2px 4px rgba(30, 80, 138, 0.1);
    transform: translateX(-3px);
  }
  .template-btn .t-title { font-size: 16px; font-weight: 700; color: var(--blue); }

  /* ── TABLE ── */
  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th {
    font-size: 14px; font-weight: 700; color: var(--muted);
    text-align: right; padding: 14px 12px;
    border-bottom: 2px solid var(--line);
    background: #f1f5f9;
  }
  .items-table td { padding: 12px; border-bottom: 1px solid var(--line); vertical-align: top; }

  textarea, input[type="text"], input[type="number"] { 
    border: 1px solid var(--line); 
    border-radius: 6px;
    padding: 8px 12px;
    background: #fff;
    transition: 0.2s; 
    font-family: inherit; 
    color: var(--text);
  }
  textarea:focus, input:focus { 
    border-color: var(--blue); 
    outline: none; 
    box-shadow: 0 0 0 3px rgba(30, 80, 138, 0.15);
  }

  .parent-row textarea { width: 100%; font-size: 16px; font-weight: 600; resize: vertical; min-height: 45px; }
  .sub-row { background: #fafbfc; }
  .sub-row input[type="text"] { font-size: 15px; width: 100%; }
  
  input[type="number"] { font-size: 16px; font-weight: 600; }

  .delete-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 20px; transition: 0.2s; padding: 0 5px; }
  .delete-btn:hover { color: var(--red); }

  .action-link { background: none; border: none; color: var(--blue); font-size: 14px; font-weight: 700; cursor: pointer; padding: 0; margin-left: 15px; }
  .action-link:hover { text-decoration: underline; }
  .action-link.red { color: var(--red); }

  /* ── SUMMARY ── */
  .summary-section { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 25px; align-items: flex-start; }
  .summary-box { background: var(--white); border: 1px solid var(--line); border-radius: 10px; width: 350px; padding: 25px; flex-shrink: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 16px; font-weight: 500; }
  .summary-row.total { border-top: 3px solid var(--blue); border-bottom: none; color: var(--blue); font-weight: 800; font-size: 22px; margin-top: 15px; padding-top: 20px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="icon">🔨</div>
    <div class="brand">שטיין יפים שיפוצים</div>
  </div>
  <div class="topbar-actions">
    <input type="file" id="file-upload" style="display:none" accept=".json">
    
    <button type="button" class="btn btn-outline" id="btn-new">הצעה חדשה</button>
    <button type="button" class="btn btn-outline" id="btn-upload-trigger">📂 טען הצעה </button>
    <button type="button" class="btn btn-outline" id="btn-save">💾 שמור הצעה </button>
    <button type="button" class="btn btn-gold" id="btn-print">🖨 הדפס הצעה </button>
  </div>
</div>

<div class="client-strip">
  <div class="field">
    <label>נושא ההצעה:</label>
    <input type="text" id="quote-title" placeholder="">
  </div>
  <div class="field">
    <label>שם הלקוח:</label>
    <input type="text" id="client-name" placeholder="">
  </div>
</div>

<div class="app-layout">
  
  <aside class="sidebar">
    <div class="panel" style="margin-bottom: 0;">
      <div class="panel-head" style="background: var(--blue); color: white; border-bottom: none;">
        <div class="dot" style="background: white;"></div> תבניות נפוצות
      </div>
      <div class="panel-body" style="padding: 15px; background: #f8fafc;">
        
        <button type="button" class="template-btn tmpl-btn" data-tmpl="bathroom">
          <span class="t-title">+ שיפוץ אמבטיה</span>
        </button>

        <button type="button" class="template-btn tmpl-btn" data-tmpl="electricity">
          <span class="t-title">+ עבודות חשמל</span>
        </button>

        <button type="button" class="template-btn tmpl-btn" data-tmpl="ceramics">
          <span class="t-title">+ הדבקת קרמיקה</span>
        </button>

        <button type="button" class="template-btn tmpl-btn" data-tmpl="plumbing">
          <span class="t-title">+ עבודות אינסטלציה</span>
        </button>

        <button type="button" class="template-btn tmpl-btn" data-tmpl="painting">
          <span class="t-title">+ צביעת דירה</span>
        </button>

        <button type="button" class="template-btn tmpl-btn" data-tmpl="waste">
          <span class="t-title">+ פינוי פסולת בניה</span>
        </button>

      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="panel">
      <div class="panel-head"><div class="dot"></div> פירוט העבודות</div>
      <div class="panel-body" style="padding:0; overflow-x: auto;">
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:50px; text-align:center;">#</th>
              <th style="min-width: 300px;">תיאור עבודה</th>
              <th style="width:140px; text-align:center;">מחיר </th>
              <th style="width:150px; text-align:left;">סה"כ ₪ ללא מע"מ  </th>
              <th style="width:60px;"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
        <div style="padding: 20px;">
          <button type="button" class="btn btn-outline" id="btn-add-row" style="width:100%; border-style: dashed; padding: 14px;">+ הוסף שורת עבודה </button>
        </div>
      </div>
    </div>

    <div class="summary-section">
      <div class="panel" style="flex: 1; min-width: 300px;">
        <div class="panel-head"><div class="dot"></div> הערות</div>
        <div class="panel-body" style="padding: 20px;">
          <textarea id="notes" style="width:100%; min-height:80px; font-size: 16px;" placeholder=""></textarea>
        </div>
      </div>

      <div class="summary-box">
        <div class="summary-row">
          <span>לפני מע"מ:</span>
          <span id="sum-before" style="font-weight: 700;">₪0</span>
        </div>
        <div style="padding: 15px 0;">
          <label style="display:flex; align-items:center; gap:8px; font-size: 15px; cursor:pointer; font-weight: 600;">
            <input type="checkbox" id="vat-check" checked style="width:18px; height:18px; cursor:pointer;">
            כולל מע"מ (18%)
          </label>
        </div>
        <div class="summary-row" id="vat-row">
          <span>מע"מ:</span>
          <span id="sum-vat" style="font-weight: 700;">₪0</span>
        </div>
        <div class="summary-row total">
          <span>סה"כ לתשלום:</span>
          <span id="sum-total">₪0</span>
        </div>
      </div>
    </div>
  </main>

</div>

<script>
let appItems = [];

const appTemplates = {
  bathroom: {
    desc: "שיפוץ אמבטיה",
    subs: [
      "פרוק קרמיקה ישנה",
      "פרוק כלים סאניטרים ישנים",
      "החלפת צנרת מים חמים וקרים בתוך האמבטיה",
      "החלפת צנרת ביוב בתוך אמבטיה",
      "הרכבת כלים סאניטריים חדשים, כולל הרכבת שירותים תלויים עם ניאגרה סמויה",
      "הרכבת קרמיקה חדשה"
    ]
  },
  electricity: { desc: "עבודות חשמל: הכוללים תאורה, מפסקים ושקעים חדשים", subs: [] },
  ceramics: { desc: "הדבקת קרמיקה", subs: [] },
  plumbing: { desc: "עבודות אינסטלציה", subs: [] },
  painting: { desc: "צביעת דירה", subs: [] },
  waste: { desc: "פינוי פסולת בניה", subs: [] }
};

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
}

function addTemplate(key) {
  const tmpl = appTemplates[key];
  if (!tmpl) return;
  const newSubs = tmpl.subs.map(function(subText) {
    return { desc: subText, price: 0 };
  });
  appItems.push({ desc: tmpl.desc, price: 0, subs: newSubs, isUnified: false });
  renderItems();
}

function addRow() {
  appItems.push({ desc: '', price: 0, subs: [], isUnified: false });
  renderItems();
}

function renderItems() {
  const tbody = document.getElementById('items-body');
  if (!tbody) return;
  tbody.innerHTML = '';
  
  appItems.forEach(function(item, i) {
    const hasSubs = item.subs.length > 0;
    const rowTotal = item.isUnified ? item.price : (hasSubs ? item.subs.reduce(function(a,b){return a+b.price;}, 0) : item.price);
    
    const tr = document.createElement('tr');
    tr.className = 'parent-row';
    tr.innerHTML = `
      <td style="text-align:center; font-weight:800; color:var(--blue); font-size:18px; padding-top:18px;">${i+1}</td>
      <td>
        <textarea class="desc-input" data-i="${i}" placeholder="">${escapeHtml(item.desc)}</textarea>
        <div style="margin: 8px 0 12px 0;">
          <button type="button" class="action-link add-sub-btn" data-i="${i}">+ הוסף תת שורה</button>
          ${hasSubs ? `<button type="button" class="action-link toggle-unified-btn ${item.isUnified ? 'red' : ''}" data-i="${i}">
            ${item.isUnified ? '✕ בטל מחיר אחיד' : '⚙ מחיר אחיד'}
          </button>` : ''}
        </div>
      </td>
      <td style="text-align:center;">
        ${(!hasSubs || item.isUnified) ? 
          `<input type="number" class="price-input-main" data-i="${i}" style="width:110px; text-align:left;" value="${item.price}">` : 
          `<span style="font-size:13px; color:var(--muted); font-style:italic; font-weight:600;">מחושב לפי הפירוט</span>`}
      </td>
      <td style="font-weight:800; padding-top:18px; font-size:18px; color:var(--text);" id="total-row-${i}">₪${rowTotal.toLocaleString()}</td>
      <td style="text-align:center; padding-top:16px;"><button type="button" class="delete-btn delete-parent-btn" data-i="${i}">✕</button></td>
    `;
    tbody.appendChild(tr);

    item.subs.forEach(function(sub, j) {
      const subTr = document.createElement('tr');
      subTr.className = 'sub-row';
      subTr.innerHTML = `
        <td></td>
        <td style="padding-right:35px;">
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:13px; font-weight:700; color:var(--muted); flex-shrink: 0;">${i+1}.${j+1}</span>
            <input type="text" class="sub-desc-input" data-i="${i}" data-j="${j}" value="${escapeHtml(sub.desc)}" placeholder="">
          </div>
        </td>
        <td style="text-align:center;">
          ${!item.isUnified ? `<input type="number" class="sub-price-input" data-i="${i}" data-j="${j}" style="width:90px; text-align:left;" value="${sub.price}">` : ''}
        </td>
        <td style="font-size:15px; font-weight:600; color:var(--muted); padding-top:16px;">₪${sub.price.toLocaleString()}</td>
        <td style="text-align:center; padding-top:12px;"><button type="button" class="delete-btn delete-sub-btn" data-i="${i}" data-j="${j}" style="font-size:16px;">✕</button></td>
      `;
      tbody.appendChild(subTr);
    });
  });
  calcTotals();
}

function updateRowDisplay(i) {
  const item = appItems[i];
  const rowTotal = item.isUnified ? item.price : (item.subs.length > 0 ? item.subs.reduce(function(a,b){return a+b.price;}, 0) : item.price);
  const rowElem = document.getElementById(`total-row-${i}`);
  if(rowElem) rowElem.textContent = '₪' + rowTotal.toLocaleString();
}

function calcTotals() {
  const subtotal = appItems.reduce(function(acc, it) {
    return acc + (it.isUnified ? it.price : (it.subs.length > 0 ? it.subs.reduce(function(a,b){return a+b.price;}, 0) : it.price));
  }, 0);
  
  const vatCheck = document.getElementById('vat-check');
  const vatRate = vatCheck && vatCheck.checked ? 0.18 : 0;
  const vat = subtotal * vatRate;
  
  document.getElementById('sum-before').textContent = '₪' + subtotal.toLocaleString();
  document.getElementById('sum-vat').textContent = '₪' + vat.toLocaleString();
  document.getElementById('sum-total').textContent = '₪' + (subtotal + vat).toLocaleString();
  
  const vatRow = document.getElementById('vat-row');
  if(vatRow) vatRow.style.display = vatRate > 0 ? 'flex' : 'none';
}

function saveProject() {
  const data = {
    title: document.getElementById('quote-title').value,
    client: document.getElementById('client-name').value,
    notes: document.getElementById('notes').value,
    vat: document.getElementById('vat-check').checked,
    items: appItems
  };
  
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  
  const fileName = (data.client ? "טיוטה_" + data.client.replace(/\s+/g, '_') : "טיוטת_הצעה") + ".json";
  downloadAnchorNode.setAttribute("download", fileName);
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

function loadProject(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      document.getElementById('quote-title').value = data.title || '';
      document.getElementById('client-name').value = data.client || '';
      document.getElementById('notes').value = data.notes || '';
      const vatCheck = document.getElementById('vat-check');
      if (vatCheck) vatCheck.checked = data.vat !== false;
      
      appItems = data.items || [];
      renderItems();
      calcTotals(); 
    } catch (err) {
      alert("שגיאה בטעינת הקובץ. ודא שזהו קובץ JSON תקין שנוצר על ידי המערכת.");
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetForm() {
  if(confirm("האם לפתוח הצעה חדשה? כל הנתונים יימחקו.")) {
    appItems = [];
    document.getElementById('client-name').value = '';
    document.getElementById('quote-title').value = '';
    document.getElementById('notes').value = '';
    renderItems(); 
  }
}

function printQuote() {
  if (appItems.length === 0) {
    alert("לא ניתן להדפיס הצעה ריקה. הוסף לפחות סעיף עבודה אחד.");
    return;
  }

  let isMissingDescriptions = false;
  appItems.forEach(function(item) {
    if (!item.desc.trim()) isMissingDescriptions = true;
    item.subs.forEach(function(sub) {
      if (!sub.desc.trim()) isMissingDescriptions = true;
    });
  });

  if (isMissingDescriptions) {
    alert("חובה למלא את כל תיאורי העבודה (ראשיים ותתי-סעיפים) לפני ההדפסה. אנא בדוק שורות שסומנו באדום.");
    renderItems(); 
    return;
  }

  const bizName = "שטיין יפים שיפוצים";
  const client = document.getElementById('client-name').value || "לקוח";
  const title = document.getElementById('quote-title').value || "הצעת מחיר";
  const notes = document.getElementById('notes').value;
  const isVat = document.getElementById('vat-check').checked;
  const dateStr = new Date().toLocaleDateString('he-IL');
  
  const subtotal = appItems.reduce(function(acc, it) { 
    return acc + (it.isUnified ? it.price : (it.subs.length > 0 ? it.subs.reduce(function(a,b){return a+b.price;}, 0) : it.price));
  }, 0);
  const vat = isVat ? subtotal * 0.18 : 0;
  const total = subtotal + vat;

  let tableRows = '';
  appItems.forEach(function(it, i) {
    const numSubs = it.subs.length;
    const itTotal = it.isUnified ? it.price : (numSubs > 0 ? it.subs.reduce(function(a,b){return a+b.price;}, 0) : it.price);
    const safeDesc = escapeHtml(it.desc).replace(/\n/g, '<br>');
    
    const rowspanIndexAttr = numSubs > 0 ? ` rowspan="${numSubs + 1}"` : '';
    const rowspanPriceAttr = (numSubs > 0 && it.isUnified) ? ` rowspan="${numSubs + 1}"` : '';
    
    tableRows += `
      <tr class="main-row">
        <td class="center"${rowspanIndexAttr} style="${numSubs > 0 ? 'vertical-align: middle;' : ''}">${i+1}</td>
        <td class="desc-cell"><strong>${safeDesc}</strong></td>
        <td class="price-cell"${rowspanPriceAttr} style="${(numSubs > 0 && it.isUnified) ? 'vertical-align: middle;' : ''}">₪${itTotal.toLocaleString()}</td>
      </tr>
    `;
    
    if(numSubs > 0) {
      it.subs.forEach(function(s, j) {
        tableRows += `
          <tr class="sub-row-print">
            <td class="desc-cell"><span class="sub-num">${i+1}.${j+1}</span> ${escapeHtml(s.desc)}</td>
            ${it.isUnified ? '' : `<td class="price-cell">₪${s.price.toLocaleString()}</td>`}
          </tr>
        `;
      });
    }
  });

  const printHtml = `
    <!DOCTYPE html>
    <html lang="he" dir="rtl">
    <head>
      <meta charset="UTF-8">
      <title>${escapeHtml(title)}</title>
      <style>
        @page {
          size: A4;
          margin: 0mm; 
        }
        body { 
          font-family: Arial, Helvetica, sans-serif; 
          color: #000000; 
          margin: 0; 
          padding: 20mm 20mm; 
          font-size: 15px; 
          line-height: 1.4; 
          box-sizing: border-box;
        }

        .header { 
          display: flex; 
          align-items: center; 
          justify-content: space-between; 
          border-bottom: 3px solid #000000; 
          padding-bottom: 15px; 
          margin-bottom: 25px; 
        }
        .header-side-right { flex: 1; text-align: right; }
        .header-center { flex: 2; text-align: center; }
        .header-side-left { flex: 1; text-align: left; }

        .header h1 { margin: 0; font-size: 26px; color: #000000; letter-spacing: -0.5px; }
        .header h2 { margin: 0; font-size: 32px; color: #000000; }
        .header p { margin: 0; color: #333333; font-size: 16px; font-weight: bold; }
        
        .client-box { background-color: #f5f5f5; padding: 12px 15px; border: 1px solid #999999; margin-bottom: 25px; border-radius: 6px; font-size: 16px; color: #000000; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #666666; padding: 6px 10px; text-align: right; }
        th { background-color: #eeeeee; font-weight: bold; font-size: 15px; color: #000000; padding: 10px; }
        .center { text-align: center; }
        .price-cell { font-weight: bold; width: 140px; font-size: 15px; }
        .desc-cell { font-size: 15px; color: #000000; }
        
        .main-row td { padding-top: 10px; padding-bottom: 10px; font-size: 16px; color: #000000; }
        .sub-row-print td { color: #333333; padding-top: 4px; padding-bottom: 4px; border-top: none; font-size: 14px; }
        .sub-num { color: #666666; font-size: 13px; font-weight: bold; margin-left: 8px; }
        
        .totals-container { width: 300px; float: left; border: 1px solid #999999; padding: 15px; background: #f5f5f5; border-radius: 6px; }
        .totals-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; font-weight: bold; color: #333333; }
        .grand-total { font-size: 20px; font-weight: 800; border-top: 3px solid #000000; margin-top: 10px; padding-top: 10px; color: #000000; }
        
        .clear { clear: both; }
        .notes-box { margin-top: 30px; padding: 15px; border-right: 5px solid #000000; background: #f5f5f5; border-radius: 4px; }
        .notes-box pre { font-family: Arial, Helvetica, sans-serif; white-space: pre-wrap; margin: 0; margin-top: 5px; font-size: 15px; line-height: 1.4; color: #000000; }
        
        .disclaimer { margin-top: 30px; padding-top: 10px; border-top: 1px solid #999999; font-size: 13px; color: #333333; font-weight: bold; }
        
        @media print {
          .totals-container { break-inside: avoid; }
          * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; print-color-adjust: exact !important; }
        }
      </style>
    </head>
    <body>
      <div class="header">
        <div class="header-side-right">
          <h1>${bizName}</h1>
        </div>
        <div class="header-center">
          <h2>${escapeHtml(title)}</h2>
        </div>
        <div class="header-side-left">
          <p>תאריך: ${dateStr}</p>
        </div>
      </div>
      
      <div class="client-box">
        <strong>לכבוד:</strong> ${escapeHtml(client)}
      </div>
      
      <table>
        <thead>
          <tr>
            <th style="width: 60px;" class="center">#</th>
            <th>תיאור העבודה</th>
            <th class="price-cell">סה"כ</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
        </tbody>
      </table>
      
      <div class="totals-container">
        <div class="totals-row">
          <span>סה"כ לפני מע"מ:</span>
          <span>₪${subtotal.toLocaleString()}</span>
        </div>
        ${isVat ? `
        <div class="totals-row">
          <span>מע"מ (18%):</span>
          <span>₪${vat.toLocaleString()}</span>
        </div>` : ''}
        <div class="totals-row grand-total">
          <span>סה"כ לתשלום:</span>
          <span>₪${total.toLocaleString()}</span>
        </div>
      </div>
      <div class="clear"></div>
      
      ${notes ? `
      <div class="notes-box">
        <strong style="font-size: 18px;">הערות:</strong>
        <pre>${escapeHtml(notes)}</pre>
      </div>` : ''}
      
      <div class="disclaimer">
        * המחיר לא כולל קרמיקה ברזים, שקעים, מפסקים, גופי תאורה, כלים סאניטריים, רדיאטורים ועבודות נגרות
      </div>

    </html>
  `;

  let iframe = document.getElementById('print-iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.id = 'print-iframe';
    iframe.style.position = 'absolute';
    iframe.style.top = '-10000px';
    iframe.style.width = '1200px';
    iframe.style.height = '1200px';
    iframe.style.border = 'none';
    document.body.appendChild(iframe);
  }

  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(printHtml);
  doc.close();

  setTimeout(function() {
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
  }, 500);
}

// === ניהול אירועים מרוכז ===
function handleTableClick(e) {
  const addSubBtn = e.target.closest('.add-sub-btn');
  if (addSubBtn) {
    const i = parseInt(addSubBtn.getAttribute('data-i'));
    appItems[i].subs.push({ desc: '', price: 0 });
    renderItems();
    return;
  }

  const toggleBtn = e.target.closest('.toggle-unified-btn');
  if (toggleBtn) {
    const i = parseInt(toggleBtn.getAttribute('data-i'));
    appItems[i].isUnified = !appItems[i].isUnified;
    if (appItems[i].isUnified) {
      const currentSubSum = appItems[i].subs.reduce((a, b) => a + b.price, 0);
      if (currentSubSum > 0) appItems[i].price = currentSubSum;
      appItems[i].subs.forEach(s => s.price = 0);
    }
    renderItems();
    return;
  }

  const delParentBtn = e.target.closest('.delete-parent-btn');
  if (delParentBtn) {
    const i = parseInt(delParentBtn.getAttribute('data-i'));
    appItems.splice(i, 1);
    renderItems();
    return;
  }

  const delSubBtn = e.target.closest('.delete-sub-btn');
  if (delSubBtn) {
    const i = parseInt(delSubBtn.getAttribute('data-i'));
    const j = parseInt(delSubBtn.getAttribute('data-j'));
    appItems[i].subs.splice(j, 1);
    renderItems();
    return;
  }
}

function handleTableInput(e) {
  const target = e.target;
  target.style.borderColor = 'var(--line)';

  if (target.classList.contains('desc-input')) {
    const i = parseInt(target.getAttribute('data-i'));
    appItems[i].desc = target.value;
  } else if (target.classList.contains('sub-desc-input')) {
    const i = parseInt(target.getAttribute('data-i'));
    const j = parseInt(target.getAttribute('data-j'));
    appItems[i].subs[j].desc = target.value;
  } else if (target.classList.contains('price-input-main')) {
    const i = parseInt(target.getAttribute('data-i'));
    appItems[i].price = parseFloat(target.value) || 0;
    calcTotals();
    updateRowDisplay(i);
  } else if (target.classList.contains('sub-price-input')) {
    const i = parseInt(target.getAttribute('data-i'));
    const j = parseInt(target.getAttribute('data-j'));
    appItems[i].subs[j].price = parseFloat(target.value) || 0;
    calcTotals();
    updateRowDisplay(i);
  }
}

function handleTableFocusOut(e) {
  const target = e.target;
  if (target.classList.contains('desc-input') || target.classList.contains('sub-desc-input')) {
    if (!target.value.trim()) target.style.borderColor = 'var(--red)';
  }
}

function initApp() {
  const btnNew = document.getElementById('btn-new');
  if (!btnNew || btnNew.dataset.init) return;
  btnNew.dataset.init = "true";

  btnNew.addEventListener('click', resetForm);
  document.getElementById('btn-upload-trigger').addEventListener('click', () => document.getElementById('file-upload').click());
  document.getElementById('file-upload').addEventListener('change', loadProject);
  document.getElementById('btn-save').addEventListener('click', saveProject);
  
  document.getElementById('btn-print').addEventListener('click', printQuote);
  
  document.getElementById('btn-add-row').addEventListener('click', addRow);
  document.getElementById('vat-check').addEventListener('change', calcTotals);

  document.querySelectorAll('.tmpl-btn').forEach(btn => {
    btn.addEventListener('click', function() { addTemplate(this.getAttribute('data-tmpl')); });
  });

  const tbody = document.getElementById('items-body');
  tbody.addEventListener('click', handleTableClick);
  tbody.addEventListener('input', handleTableInput);
  tbody.addEventListener('focusout', handleTableFocusOut);
}

initApp();
document.addEventListener('DOMContentLoaded', initApp);
</script>
